<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria — AC Service</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .chat-container {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    max-height: 800px;
    background: white;
    display: flex;
    flex-direction: column;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    overflow: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #6c63ff, #4ecdc4);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
  }

  .avatar {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
  }

  .header-info h2 { font-size: 16px; font-weight: 600; }
  .header-info p  { font-size: 12px; opacity: 0.85; }

  .status-dot {
    width: 8px; height: 8px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .message {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .message.aria .msg-avatar  { background: #ede9fe; color: #6c63ff; }
  .message.user .msg-avatar  { background: #dcfce7; color: #16a34a; }

  .msg-bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
  }

  .message.aria .msg-bubble {
    background: #f3f4f6;
    color: #111;
    border-bottom-left-radius: 4px;
  }

  .message.user .msg-bubble {
    background: #6c63ff;
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg-meta {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .play-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #6c63ff;
    font-size: 16px;
    padding: 0;
    line-height: 1;
  }

  .play-btn:hover { color: #4f46e5; }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 10px 14px;
    background: #f3f4f6;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing span {
    width: 7px; height: 7px;
    background: #9ca3af;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30%           { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    padding: 12px 16px;
    border-top: 1px solid #f0f0f0;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: white;
  }

  .input-wrap {
    flex: 1;
    background: #f3f4f6;
    border-radius: 24px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
  }

  #msg-input {
    flex: 1;
    border: none;
    background: none;
    outline: none;
    font-size: 14px;
    color: #111;
    resize: none;
    max-height: 100px;
    font-family: inherit;
  }

  #msg-input::placeholder { color: #9ca3af; }

  .send-btn {
    width: 42px; height: 42px;
    background: #6c63ff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover    { background: #4f46e5; }
  .send-btn:disabled { background: #d1d5db; cursor: not-allowed; }

  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Mode badge */
  .mode-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 8px;
    background: #ede9fe;
    color: #6c63ff;
    font-weight: 500;
  }

  .mode-badge.support { background: #fef3c7; color: #d97706; }
  .mode-badge.sales   { background: #dcfce7; color: #16a34a; }
</style>
</head>
<body>

<div class="chat-container">

  <!-- Header -->
  <div class="header">
    <div class="avatar">A</div>
    <div class="header-info">
      <h2>Aria</h2>
      <p><span class="status-dot"></span>AC Service Executive</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="msg-input"
        placeholder="Apni problem likhein... (Hindi ya English)"
        rows="1"
        onkeydown="handleKey(event)"
      ></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  let   currentAudio = null;

  // ── Auto-resize textarea ──────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Add message to UI ────────────────────────────────────
  function addMessage(text, sender, meta = {}) {
    const div      = document.createElement('div');
    div.className  = `message ${sender}`;

    const initials = sender === 'aria' ? 'A' : 'U';
    const badgeClass = meta.mode ? `mode-badge ${meta.mode}` : 'mode-badge';
    const modeLabel  = meta.mode ? meta.mode : '';

    let metaHtml = '';
    if (sender === 'aria') {
      metaHtml = `
        <div class="msg-meta">
          ${modeLabel ? `<span class="${badgeClass}">${modeLabel}</span>` : ''}
          ${meta.audio_id ? `<button class="play-btn" onclick="playAudio('${meta.audio_id}')" title="Suno">🔊</button>` : ''}
        </div>`;
    }

    div.innerHTML = `
      <div class="msg-avatar">${initials}</div>
      <div>
        <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
        ${metaHtml}
      </div>`;

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  // ── Typing indicator ─────────────────────────────────────
  function showTyping() {
    const div     = document.createElement('div');
    div.className = 'message aria';
    div.id        = 'typing-indicator';
    div.innerHTML = `
      <div class="msg-avatar">A</div>
      <div class="typing"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ── Play audio ───────────────────────────────────────────
  function playAudio(audioId) {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    currentAudio = new Audio(`/audio/${audioId}`);
    currentAudio.play().catch(e => console.log('Audio play failed:', e));
  }

  // ── Send message ─────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Add user message
    addMessage(text, 'user');
    inputEl.value       = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled    = true;

    // Show typing
    showTyping();

    try {
      const res  = await fetch('/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text }),
      });
      const data = await res.json();

      hideTyping();
      addMessage(data.response, 'aria', {
        mode:     data.mode,
        audio_id: data.audio_id,
      });

      // Auto-play audio
      if (data.audio_id) {
        playAudio(data.audio_id);
      }

    } catch (err) {
      hideTyping();
      addMessage('Kuch technical problem aa gayi. Please dobara try karein.', 'aria');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── On load — Aria greets ────────────────────────────────
  window.addEventListener('load', async () => {
    try {
      const res  = await fetch('/greet', { method: 'POST' });
      const data = await res.json();
      addMessage(data.response, 'aria', {
        mode:     data.mode,
        audio_id: data.audio_id,
      });
      if (data.audio_id) {
        setTimeout(() => playAudio(data.audio_id), 500);
      }
    } catch {
      addMessage('Namaste! Main Aria hoon. Kaise madad kar sakti hoon?', 'aria');
    }
    inputEl.focus();
  });
</script>
</body>
</html>
